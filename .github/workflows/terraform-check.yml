name: Terraform Check

on:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.0

      - name: fmt ass1
        working-directory: ass1
        run: terraform fmt -check

      - name: init ass1
        working-directory: ass1
        run: terraform init

      - name: validate ass1
        working-directory: ass1
        run: terraform validate

      - name: plan ass1
        working-directory: ass1
        run: terraform plan

      - name: fmt ass2
        working-directory: ass2
        run: terraform fmt -check

      - name: init ass2
        working-directory: ass2
        run: terraform init

      - name: validate ass2
        working-directory: ass2
        run: terraform validate

      - name: plan ass2
        working-directory: ass2
        run: terraform plan -var-file="dev.tfvars"
